name: Compilar APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar el código
      uses: actions/checkout@v4

    - name: Descomprimir el proyecto (si se subió como ZIP)
      run: |
        # Busca cualquier archivo .zip en la raíz y lo descomprime
        for zipfile in *.zip; do
          if [ -f "$zipfile" ]; then
            echo "Descomprimiendo $zipfile..."
            unzip -o "$zipfile" -d .
            # Si el ZIP creó una carpeta con el nombre del proyecto, mueve su contenido a la raíz
            for dir in AutoTAppPro AutoTapPro; do
              if [ -d "$dir" ]; then
                echo "Moviendo contenido de $dir a la raíz..."
                mv "$dir"/* . 2>/dev/null || true
                rm -rf "$dir"
              fi
            done
          fi
        done
        echo "Contenido después de descomprimir:"
        ls -la

    - name: Instalar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Configurar Android SDK
      uses: android-actions/setup-android@v2

    - name: Configurar Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: 8.5

    - name: Compilar APK de Debug
      run: gradle assembleDebug

    - name: Subir APK como artefacto
      uses: actions/upload-artifact@v4
      with:
        name: AutoTAppPro-Debug-APK
        path: app/build/outputs/apk/debug/*.apk
